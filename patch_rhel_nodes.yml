---
- name: Enterprise OS Patching and Reboot Management
  hosts: all
  become: true
  
  tasks:
    - name: Ensure yum-utils is installed (Required for reboot check)
      ansible.builtin.dnf:
        name: yum-utils
        state: present

    - name: Upgrade all packages (including security updates)
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true
      register: dnf_update_status

    - name: Check if a reboot is required
      ansible.builtin.command: dnf needs-restarting -r
      register: reboot_required
      # dnf needs-restarting -r returns 1 if a reboot is needed, 0 if not.
      # We ignore the error so the playbook doesn't fail when it returns 1.
      failed_when: false
      changed_when: reboot_required.rc == 1

    - name: Reboot server if necessary
      ansible.builtin.reboot:
        msg: "Automated reboot triggered by AWX after OS patching."
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0
        post_reboot_delay: 30
        test_command: whoami
      when: reboot_required.rc == 1

    - name: Display patch summary
      ansible.builtin.debug:
        msg: 
          - "System patched successfully."
          - "Reboot triggered: {{ 'Yes' if reboot_required.rc == 1 else 'No' }}"
