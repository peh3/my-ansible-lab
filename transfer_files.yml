---
- name: Transfer File from Host 1 to Host 2
  hosts: localhost  
  become: true
  
  tasks:
    # ---------------------------------------------------------
    # STEP 1: Pull from Host 1
    # ---------------------------------------------------------
    - name: Fetch file from Host 1
      ansible.builtin.fetch:
        src: /var/log/app_export.csv    
        dest: /tmp/transfer_cache/      
        flat: true                      
      delegate_to: rhel-node-01         # <--- MUST MATCH AWX HOST NAME EXACTLY

    # ---------------------------------------------------------
    # STEP 2: Push to Host 2
    # ---------------------------------------------------------
    - name: Copy the fetched file to Host 2
      ansible.builtin.copy:
        src: /tmp/transfer_cache/app_export.csv  
        dest: /opt/data/app_export.csv           
        owner: root
        group: root
        mode: '0644'
      delegate_to: rhel-node-02         # <--- MUST MATCH AWX HOST NAME EXACTLY
